<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Iman · Learning Icons</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:linear-gradient(180deg,#EEF6FF 0%, #D5E7F7 100%);color:#10243A;font-family:'Fredoka',system-ui,sans-serif;min-height:100vh}
  body{padding:56px 24px 80px;display:flex;justify-content:center}
  .page{width:100%;max-width:1260px}
  h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:48px;color:#0B7CA8;margin:0 0 8px;text-align:center;text-shadow:0 2px 0 #fff, 0 6px 0 rgba(11,124,168,.12)}
  .sub{text-align:center;color:#6B7891;font-weight:600;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;margin:0 0 40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;justify-items:center}
  .card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 12px 30px -12px rgba(11,124,168,.22), 0 2px 4px rgba(11,124,168,.06);display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
  .card:hover{transform:translateY(-5px)}
  .card svg{width:200px;height:200px;display:block}
  .name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;color:#475669;letter-spacing:.04em}
</style>
</head>
<body>
<div class="page">
  <h1>Iman · Learning Icons</h1>
  <div class="sub">Robot-Head Activity Buttons</div>

  <div class="grid">

    <!-- ───────────────── 1 · LEARN KV WORDS (Sky Blue) ───────────────── -->
    <div class="card">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <defs>
          <radialGradient id="kvHead" cx="25%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#90CAF9"/><stop offset="50%" stop-color="#1E88E5"/><stop offset="100%" stop-color="#0D47A1"/>
          </radialGradient>
          <radialGradient id="kvFace" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#0D1F33"/><stop offset="100%" stop-color="#040C18"/>
          </radialGradient>
          <linearGradient id="kvBlockA" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFE082"/><stop offset="100%" stop-color="#F57F17"/>
          </linearGradient>
          <linearGradient id="kvBlockB" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FF8B95"/><stop offset="100%" stop-color="#C62828"/>
          </linearGradient>
          <filter id="kvGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E88E5" flood-opacity="0.4"/>
          </filter>
        </defs>
        <!-- white frame -->
        <rect x="10" y="10" width="180" height="180" rx="30" ry="30" fill="#FFFFFF" stroke="#1E88E5" stroke-width="4"/>
        <!-- antenna -->
        <line x1="100" y1="12" x2="100" y2="32" stroke="#BBDEFB" stroke-width="4" stroke-linecap="round"/>
        <circle cx="100" cy="8" r="8" fill="#FFEB3B" filter="url(#kvGlow)"/>
        <circle cx="100" cy="8" r="3" fill="#FFF"/>
        <!-- head -->
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="url(#kvHead)" filter="url(#kvGlow)"/>
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="none" stroke="#BBDEFB" stroke-width="3"/>
        <!-- ears -->
        <ellipse cx="15" cy="100" rx="12" ry="22" fill="url(#kvHead)" filter="url(#kvGlow)"/>
        <ellipse cx="15" cy="100" rx="12" ry="22" fill="none" stroke="#BBDEFB" stroke-width="2"/>
        <ellipse cx="185" cy="100" rx="12" ry="22" fill="url(#kvHead)" filter="url(#kvGlow)"/>
        <ellipse cx="185" cy="100" rx="12" ry="22" fill="none" stroke="#BBDEFB" stroke-width="2"/>
        <!-- face screen -->
        <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="url(#kvFace)"/>
        <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="none" stroke="#64B5F6" stroke-width="2" opacity="0.5"/>
        <!-- ILLUSTRATION: 2 letter blocks "B A" with joining sparkle -->
        <g transform="translate(0 10)">
          <!-- B block -->
          <rect x="54" y="68" width="40" height="40" rx="6" fill="url(#kvBlockB)" stroke="#7A1010" stroke-width="2"/>
          <rect x="54" y="68" width="40" height="10" rx="6" fill="rgba(255,255,255,.45)"/>
          <text x="74" y="100" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="26" fill="#fff" stroke="#7A1010" stroke-width=".5">B</text>
          <!-- A block -->
          <rect x="106" y="68" width="40" height="40" rx="6" fill="url(#kvBlockA)" stroke="#7A4D02" stroke-width="2"/>
          <rect x="106" y="68" width="40" height="10" rx="6" fill="rgba(255,255,255,.55)"/>
          <text x="126" y="100" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="26" fill="#fff" stroke="#7A4D02" stroke-width=".5">A</text>
          <!-- linking spark -->
          <circle cx="100" cy="88" r="3" fill="#FFEB3B"/>
          <polygon points="50,60 52,64 56,66 52,68 50,72 48,68 44,66 48,64" fill="#FFEB3B" opacity="0.8"/>
          <polygon points="150,60 152,64 156,66 152,68 150,72 148,68 144,66 148,64" fill="#FFEB3B" opacity="0.6"/>
          <!-- result word "BA" hint under blocks -->
          <text x="100" y="130" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="16" fill="#FFEB3B">BA</text>
        </g>
        <text x="100" y="178" font-size="14" font-family="'Fredoka','Baloo 2',sans-serif" font-weight="700" fill="#1E88E5" text-anchor="middle" dominant-baseline="central">Learn KV Words</text>
      </svg>
    </div>

    <!-- ───────────────── 2 · LEARN KVK WORDS (Green) ───────────────── -->
    <div class="card">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <defs>
          <radialGradient id="kvkHead" cx="25%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#A5D6A7"/><stop offset="50%" stop-color="#43A047"/><stop offset="100%" stop-color="#1B5E20"/>
          </radialGradient>
          <radialGradient id="kvkFace" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#0F2D17"/><stop offset="100%" stop-color="#06170A"/>
          </radialGradient>

            <stop offset="0%" stop-color="#FF8B95"/><stop offset="100%" stop-color="#C62828"/>

        <circle cx="100" cy="8" r="8" fill="#FFEB3B" filter="url(#kvkGlow)"/>
        <circle cx="100" cy="8" r="3" fill="#FFF"/>
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="url(#kvkHead)" filter="url(#kvkGlow)"/>
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="none" stroke="#C8E6C9" stroke-width="3"/>
        <ellipse cx="15" cy="100" rx="12" ry="22" fill="url(#kvkHead)" filter="url(#kvkGlow)"/>
        <ellipse cx="15" cy="100" rx="12" ry="22" fill="none" stroke="#C8E6C9" stroke-width="2"/>
        <ellipse cx="185" cy="100" rx="12" ry="22" fill="url(#kvkHead)" filter="url(#kvkGlow)"/>
        <ellipse cx="185" cy="100" rx="12" ry="22" fill="none" stroke="#C8E6C9" stroke-width="2"/>
        <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="url(#kvkFace)"/>
        <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.5"/>
        <!-- ILLUSTRATION: 3 letter blocks K A N -->
        <g transform="translate(0 8)">
          <rect x="44" y="72" width="32" height="36" rx="5" fill="url(#kvkBlock1)" stroke="#7A1010" stroke-width="2"/>
          <rect x="44" y="72" width="32" height="9" rx="5" fill="rgba(255,255,255,.45)"/>
          <text x="60" y="100" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="22" fill="#fff" stroke="#7A1010" stroke-width=".5">K</text>

          <rect x="84" y="72" width="32" height="36" rx="5" fill="url(#kvkBlock2)" stroke="#7A4D02" stroke-width="2"/>
          <rect x="84" y="72" width="32" height="9" rx="5" fill="rgba(255,255,255,.55)"/>
          <text x="100" y="100" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="22" fill="#fff" stroke="#7A4D02" stroke-width=".5">A</text>

          <rect x="124" y="72" width="32" height="36" rx="5" fill="url(#kvkBlock3)" stroke="#0B4A8E" stroke-width="2"/>
          <rect x="124" y="72" width="32" height="9" rx="5" fill="rgba(255,255,255,.45)"/>
          <text x="140" y="100" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="22" fill="#fff" stroke="#0B4A8E" stroke-width=".5">N</text>

          <!-- result word hint -->
          <text x="100" y="128" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="16" fill="#FFEB3B">KAN</text>
          <polygon points="48,62 50,66 54,68 50,70 48,74 46,70 42,68 46,66" fill="#FFEB3B" opacity="0.8"/>
          <polygon points="152,62 154,66 158,68 154,70 152,74 150,70 146,68 150,66" fill="#FFEB3B" opacity="0.6"/>
        </g>
        <text x="100" y="178" font-size="13" font-family="'Fredoka','Baloo 2',sans-serif" font-weight="700" fill="#43A047" text-anchor="middle" dominant-baseline="central">Learn KVK Words</text>
      </svg>
    </div>

    <!-- ───────────────── 3 · ENGLISH PHONICS (Pink) ───────────────── -->
    <div class="card">

        <circle cx="100" cy="8" r="8" fill="#FFEB3B" filter="url(#phGlow)"/>
        <circle cx="100" cy="8" r="3" fill="#FFF"/>
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="url(#phHead)" filter="url(#phGlow)"/>
        <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="none" stroke="#F8BBD0" stroke-width="3"/>

          <text x="100" y="88" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="22" fill="#fff" stroke="#0B4A6F" stroke-width=".5">B</text>

          <ellipse cx="130" cy="88" rx="5" ry="7" fill="#fff" opacity=".4" transform="rotate(-20 130 88)"/>
          <text x="135" y="103" text-anchor="middle" font-family="'Baloo 2','Comic Sans MS',sans-serif" font-weight="800" font-size="22" fill="#fff" stroke="#1F4A00" stroke-width=".5">C</text>

    <!-- ───────────────── 4 · NUMBER 1-100 (Gold) ───────────────── -->
    <div class="card">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <defs>
          <radialGradient id="numHead" cx="25%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#FFE082"/><stop offset="50%" stop-color="#FFB300"/><stop offset="100%" stop-color="#E65100"/>

    <!-- ───────────────── 5 · OBJECTS (Teal) ───────────────── -->
    <div class="card">

        <rect x="10" y="10" width="180" height="180" rx="30" ry="30" fill="#FFFFFF" stroke="#00897B" stroke-width="4"/>
