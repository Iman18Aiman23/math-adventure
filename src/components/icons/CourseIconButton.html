<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Seronok!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --coral: #FF6B6B;
            --coral-light: #FFF0F0;
            --coral-mid: #FF8E72;
            --teal: #4ECDC4;
            --teal-light: #EAFAF8;
            --teal-mid: #3DB8B0;
            --gold: #FFB347;
            --gold-light: #FFF7EC;
            --gold-mid: #E89F2C;
            --green: #6BCB77;
            --green-light: #EEFBF0;
            --green-mid: #4AA85B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #FFF8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1,
        .card-label {
            font-family: 'Fredoka One', cursive;
        }

        /* ========= Kad subjek ========= */
        .subject-card {
            border-radius: 28px;
            padding: 28px 16px 20px;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease;
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        }

        .subject-card:active {
            transform: translateY(-2px) scale(0.96);
            transition-duration: 0.12s;
        }

        .card-deco {
            position: absolute;
            border-radius: 50%;
            opacity: 0.13;
            pointer-events: none;
        }

        /* ========= Animasi SVG (aktif hanya semasa hover) ========= */
        @keyframes bounceUp {

            0%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-14px);
            }

            60% {
                transform: translateY(-14px);
            }
        }

        @keyframes floatLetter {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-7px) rotate(5deg);
            }
        }

        @keyframes pulseStar {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.25);
                opacity: 0.7;
            }
        }

        @keyframes waveArc {

            0%,
            100% {
                transform: scaleX(1);
                opacity: 0.7;
            }

            50% {
                transform: scaleX(1.35);
                opacity: 1;
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-6deg);
            }

            75% {
                transform: rotate(6deg);
            }
        }

        @keyframes blinkEyes {

            0%,
            92%,
            100% {
                transform: scaleY(1);
            }

            96% {
                transform: scaleY(0.08);
            }
        }

        @keyframes inkDrip {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translateY(5px) scale(0.7);
                opacity: 0.4;
            }
        }

        @keyframes mathSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes numberPop {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.18);
            }
        }

        @keyframes jello {
            0% {
                transform: scale(1);
            }

            20% {
                transform: scale(0.94, 1.06);
            }

            40% {
                transform: scale(1.04, 0.96);
            }

            60% {
                transform: scale(0.98, 1.02);
            }

            80% {
                transform: scale(1.01, 0.99);
            }

            100% {
                transform: scale(1);
            }
        }

        .svg-wrap {
            width: 130px;
            height: 130px;
            margin: 0 auto 10px;
        }

        /* Semua elemen animasi hanya bergerak semasa hover kad */
        .subject-card:hover .svg-wrap {
            animation: bounceUp 0.7s ease-in-out infinite;
        }

        .subject-card:hover .fl1 {
            animation: floatLetter 1s ease-in-out infinite;
        }

        .subject-card:hover .fl2 {
            animation: floatLetter 1s ease-in-out infinite 0.4s;
        }

        .subject-card:hover .fl3 {
            animation: floatLetter 1s ease-in-out infinite 0.9s;
        }

        .subject-card:hover .fl4 {
            animation: floatLetter 1s ease-in-out infinite 0.2s;
        }

        .subject-card:hover .ps {
            animation: pulseStar 0.8s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        .subject-card:hover .ps2 {
            animation: pulseStar 0.8s ease-in-out infinite 0.6s;
            transform-box: fill-box;
            transform-origin: center;
        }

        .subject-card:hover .wa {
            animation: waveArc 0.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: left center;
        }

        .subject-card:hover .wa2 {
            animation: waveArc 0.5s ease-in-out infinite 0.25s;
            transform-box: fill-box;
            transform-origin: left center;
        }

        .subject-card:hover .wa3 {
            animation: waveArc 0.5s ease-in-out infinite 0.5s;
            transform-box: fill-box;
            transform-origin: left center;
        }

        .subject-card:hover .war {
            animation: waveArc 0.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: right center;
        }

        .subject-card:hover .war2 {
            animation: waveArc 0.5s ease-in-out infinite 0.25s;
            transform-box: fill-box;
            transform-origin: right center;
        }

        .subject-card:hover .war3 {
            animation: waveArc 0.5s ease-in-out infinite 0.5s;
            transform-box: fill-box;
            transform-origin: right center;
        }

        .subject-card:hover .wg {
            animation: wiggle 1s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center bottom;
        }

        .subject-card:hover .eyes {
            animation: blinkEyes 2s ease-in-out infinite;
            transform-origin: center;
        }

        .subject-card:hover .ink {
            animation: inkDrip 1.5s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center top;
        }

        .subject-card:hover .msp {
            animation: mathSpin 3s linear infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        .subject-card:hover .np {
            animation: numberPop 0.7s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }

        .subject-card:hover .np2 {
            animation: numberPop 0.7s ease-in-out infinite 0.5s;
            transform-box: fill-box;
            transform-origin: center;
        }

        .subject-card:hover .np3 {
            animation: numberPop 0.7s ease-in-out infinite 1s;
            transform-box: fill-box;
            transform-origin: center;
        }

        .jello {
            animation: jello 0.6s ease !important;
        }

        .card-label {
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 2;
        }

        /* ========= Confetti ========= */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        /* ========= Responsif ========= */
        @media (max-width: 400px) {
            .svg-wrap {
                width: 100px;
                height: 100px;
            }

            .card-label {
                font-size: 0.95rem;
            }

            .subject-card {
                padding: 20px 10px 16px;
                border-radius: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <script>
        /* ====== Kesan jello + confetti semasa klik ====== */
        function popCard(card, e) {
            card.classList.remove('jello');
            card.offsetHeight;
            card.classList.add('jello');
            setTimeout(() => card.classList.remove('jello'), 600);

            const rect = card.getBoundingClientRect();
            spawnConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
        }

        function spawnConfetti(x, y) {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCB77', '#FF8E72', '#7EDDD7', '#FF8FA3', '#FFB347'];
            for (let i = 0; i < 18; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                const size = Math.random() * 8 + 5;
                const color = colors[Math.floor(Math.random() * colors.length)];
                Object.assign(el.style, {
                    left: x + 'px', top: y + 'px',
                    width: size + 'px', height: size + 'px',
                    borderRadius: Math.random() > 0.5 ? '50%' : '2px',
                    background: color
                });
                document.body.appendChild(el);

                const angle = (Math.PI * 2 * i) / 18 + (Math.random() - 0.5) * 0.5;
                const speed = Math.random() * 6 + 3;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 4;
                let px = 0, py = 0, opacity = 1, rot = 0;
                const rotSpeed = (Math.random() - 0.5) * 15;

                (function animate() {
                    vy += 0.18;
                    px += vx; py += vy;
                    opacity -= 0.018;
                    rot += rotSpeed;
                    vx *= 0.98;
                    el.style.transform = `translate(${px}px,${py}px) rotate(${rot}deg)`;
                    el.style.opacity = Math.max(0, opacity);
                    if (opacity > 0) requestAnimationFrame(animate);
                    else el.remove();
                })();
            }
        }

        /* ====== Sokongan keyboard ====== */
        document.querySelectorAll('.subject-card').forEach(card => {
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    popCard(card, e);
                }
            });
        });
    </script>
