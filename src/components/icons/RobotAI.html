<svg width="100%" height="auto" viewBox="0 0 900 800" xmlns="http://www.w3.org/2000/svg">
<style>
.robotFloat{
  transform-origin:center;
}
.eyeBlink{
  animation: blink 5s infinite;
  transform-origin:center;
}
.eyeBlinkFast{
  animation: blink 3s infinite;
  transform-origin:center;
}
.handMoveLeft{
  animation: handLeft 2.6s ease-in-out infinite;
  transform-origin:92px 195px;
}
.handMoveRight{
  animation: handRight 2.6s ease-in-out infinite;
  transform-origin:228px 195px;
}
.handWaveLeft{
  animation: handWaveLeft 2s ease-in-out infinite;
  transform-origin:92px 195px;
}
.handWaveRight{
  animation: handWaveRight 2s ease-in-out infinite;
  transform-origin:228px 195px;
}
.glowPulse{
  animation: glow 2s ease-in-out infinite;
}
.bookBounce{
  animation: bookBounce 2s ease-in-out infinite;
  transform-origin:center;
}
.speakWave{
  animation: speakWave 1.5s ease-in-out infinite;
}
.rotateSymbol{
  animation: rotate 4s linear infinite;
  transform-origin:center;
}
/* Hover effect - stars appear around robot */
.robotWrapper{
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.robotWrapper:hover .hoverStars{
  opacity: 1;
}
.robotWrapper:hover .robotFloat{
  transform: scale(1.02);
}
.hoverStars{
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: 10000;
  position: relative;
}
.hoverStar1{
  animation: starFloat 1.5s ease-in-out infinite;
}
.hoverStar2{
  animation: starFloat 1.8s ease-in-out infinite 0.3s;
}
.hoverStar3{
  animation: starFloat 2s ease-in-out infinite 0.6s;
}
.hoverStar4{
  animation: starFloat 1.6s ease-in-out infinite 0.9s;
}
.hoverStar5{
  animation: starFloat 2.2s ease-in-out infinite 0.2s;
}
/* Floating subject elements - HIGH Z-INDEX */
.floatContainer{
  z-index: 9999;
  position: relative;
  pointer-events: none;
}
.floatElem1{
  animation: floatElem 3s ease-in-out infinite;
  position: relative;
}
.floatElem2{
  animation: floatElem 3.5s ease-in-out infinite 0.5s;
  position: relative;
}
.floatElem3{
  animation: floatElem 2.8s ease-in-out infinite 1s;
  position: relative;
}
.floatElem4{
  animation: floatElem 4s ease-in-out infinite 0.3s;
  position: relative;
}
.floatElem5{
  animation: floatElem 3.2s ease-in-out infinite 0.8s;
  position: relative;
}
.floatElem6{
  animation: floatElem 2.5s ease-in-out infinite 1.2s;
  position: relative;
}
@keyframes blink{
  0%,92%,100%{transform:scaleY(1);}
  95%{transform:scaleY(0.08);}
}
@keyframes handLeft{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(10deg);}
}
@keyframes handRight{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(-10deg);}
}
@keyframes handWaveLeft{
  0%,100%{transform:rotate(-10deg);}
  50%{transform:rotate(20deg);}
}
@keyframes handWaveRight{
  0%,100%{transform:rotate(10deg);}
  50%{transform:rotate(-20deg);}
}
@keyframes glow{
  0%,100%{opacity:.7;}
  50%{opacity:1;}
}
@keyframes bookBounce{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-5px);}
}
@keyframes speakWave{
  0%,100%{transform:scale(1);opacity:0.6;}
  50%{transform:scale(1.3);opacity:1;}
}
@keyframes rotate{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
@keyframes starFloat{
  0%,100%{transform:translateY(0px) scale(1);opacity:0.8;}
  50%{transform:translateY(-8px) scale(1.2);opacity:1;}
}
@keyframes floatElem{
  0%,100%{transform:translateY(0px) translateX(0px) rotate(0deg);opacity:0.85;}
  50%{transform:translateY(-18px) translateX(10px) rotate(12deg);opacity:1;}
}
</style>
