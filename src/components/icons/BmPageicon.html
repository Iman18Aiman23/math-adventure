<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kids Owl Reading Book</title>

<style>

    body{
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:transparent;
        overflow:hidden;
    }

    .owl-wrap{
        width:380px;
        cursor:pointer;
        transition:transform .3s ease;
    }

    .owl-wrap:hover{
        transform:scale(1.03);
    }

    .book{
        animation:floatBook 3s ease-in-out infinite;
        transform-origin:center;
    }

    .eye{
        animation:blink 5s infinite;
        transform-origin:center;
    }

    .sparkle{
        animation:sparkle 2s infinite;
        transform-origin:center;
    }

    .owl-wrap:hover .book{
        transform:translateY(-4px);
    }

    @keyframes blink{
        0%,46%,48%,100%{
            transform:scaleY(1);
        }
        47%{
            transform:scaleY(.08);
        }
    }

    @keyframes sparkle{
        0%,100%{
            transform:scale(1);
            opacity:1;
        }

        50%{
            transform:scale(1.25);
            opacity:.5;
        }
    }

    @keyframes floatBook{
        0%,100%{
            transform:translateY(0);
        }

        50%{
            transform:translateY(-5px);
        }
    }

</style>
</head>

<body>

<svg class="owl-wrap"
     viewBox="0 0 500 620"
     xmlns="http://www.w3.org/2000/svg">

    <defs>

        <!-- OWL BODY -->
        <radialGradient id="bodyGrad"
                        cx="50%"
                        cy="35%"
                        r="70%">

            <stop offset="0%"
                  stop-color="#4F8DFF"/>

            <stop offset="100%"
                  stop-color="#1B4DB3"/>

        </radialGradient>

        <!-- BOOK -->
        <linearGradient id="bookGrad"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%"
                  stop-color="#FF7096"/>

            <stop offset="100%"
                  stop-color="#E63668"/>

        </linearGradient>

        <!-- PAGES -->
        <linearGradient id="pageGrad"
                        x1="0%"
                        y1="0%"
                        x2="0%"
                        y2="100%">

            <stop offset="0%"
                  stop-color="#FFFDF8"/>

            <stop offset="100%"
                  stop-color="#F4E6D2"/>

        </linearGradient>

        <!-- SHADOW -->
        <filter id="shadow">
            <feDropShadow dx="0"
                          dy="6"
                          stdDeviation="8"
                          flood-opacity=".2"/>
        </filter>

    </defs>

    <!-- SPARKLES -->
    <g class="sparkle">

        <circle cx="80"
                cy="135"
                r="6"
                fill="#FFD93D"/>

        <circle cx="425"
                cy="165"
                r="5"
                fill="#FFD93D"/>

        <circle cx="390"
                cy="100"
                r="5"
                fill="#8BFFDA"/>

    </g>

    <!-- OWL BODY -->
    <ellipse cx="250"
             cy="315"
             rx="170"
             ry="215"
             fill="url(#bodyGrad)"/>

    <!-- BELLY -->
    <ellipse cx="250"
             cy="360"
             rx="120"
             ry="160"
             fill="#F7FBFF"/>

    <!-- LEFT WING -->
    <ellipse cx="120"
             cy="365"
             rx="60"
             ry="115"
             fill="#3367CC"
             transform="rotate(-18 120 365)"/>

    <!-- RIGHT WING -->
    <ellipse cx="380"
             cy="365"
             rx="60"
             ry="115"
             fill="#3367CC"
             transform="rotate(18 380 365)"/>

    <!-- FEET -->
    <ellipse cx="190"
             cy="540"
             rx="28"
             ry="20"
             fill="#FFB000"/>

    <ellipse cx="310"
             cy="540"
             rx="28"
             ry="20"
             fill="#FFB000"/>

    <!-- HAT -->
    <path d="M120 125
             L250 75
             L380 125
             L250 175 Z"
          fill="#17233C"/>

    <rect x="175"
          y="95"
          width="150"
          height="34"
          rx="8"
          fill="#17233C"/>

    <!-- TASSEL -->
    <path d="M325 100
             Q360 125 365 180"
          stroke="#FFD93D"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"/>

    <circle cx="365"
            cy="185"
            r="12"
            fill="#FFD93D"/>

    <!-- EYES -->
    <circle cx="185"
            cy="235"
            r="72"
            fill="white"/>

    <circle cx="315"
            cy="235"
            r="72"
            fill="white"/>

    <!-- GLASSES -->
    <circle cx="185"
            cy="235"
            r="78"
            fill="none"
            stroke="#09142F"
            stroke-width="12"/>

    <circle cx="315"
            cy="235"
            r="78"
            fill="none"
            stroke="#09142F"
            stroke-width="12"/>

    <rect x="240"
          y="228"
          width="20"
          height="12"
          rx="6"
          fill="#09142F"/>

    <!-- PUPILS -->
    <g class="eye">

        <circle cx="185"
                cy="240"
                r="34"
                fill="#000"/>

        <circle cx="315"
                cy="240"
                r="34"
                fill="#000"/>

        <circle cx="197"
                cy="225"
                r="10"
                fill="white"/>

        <circle cx="327"
                cy="225"
                r="10"
                fill="white"/>

    </g>

    <!-- BLUSH -->
    <circle cx="125"
            cy="305"
            r="22"
            fill="#FFA7B8"
            opacity=".5"/>

    <circle cx="375"
            cy="305"
            r="22"
            fill="#FFA7B8"
            opacity=".5"/>

    <!-- BEAK -->
    <path d="M225 300
             L275 300
             L250 338 Z"
          fill="#FFC400"/>

    <!-- MOUTH -->
    <ellipse cx="250"
             cy="350"
             rx="18"
             ry="24"
             fill="#FF5C5C"/>

    <!-- BOOK -->
    <g class="book"
       filter="url(#shadow)">

        <!-- LEFT PAGE -->
        <path d="M145 385
                 Q210 340 250 390
                 L250 520
                 Q210 470 145 510 Z"
              fill="url(#pageGrad)"/>

        <!-- RIGHT PAGE -->
        <path d="M355 385
                 Q290 340 250 390
                 L250 520
                 Q290 470 355 510 Z"
              fill="url(#pageGrad)"/>

        <!-- LEFT COVER -->
        <path d="M120 370
                 Q190 330 250 390
                 L250 545
                 Q190 490 120 530 Z"
              fill="url(#bookGrad)"/>

        <!-- RIGHT COVER -->
        <path d="M380 370
                 Q310 330 250 390
                 L250 545
                 Q310 490 380 530 Z"
              fill="url(#bookGrad)"/>

        <!-- BOOK CENTER -->
        <rect x="235"
              y="370"
              width="30"
              height="175"
              rx="10"
              fill="#E42D67"/>

        <!-- GOLD LINES -->
        <line x1="150"
              y1="420"
              x2="220"
              y2="438"
              stroke="#FFD93D"
              stroke-width="5"
              stroke-linecap="round"/>

        <line x1="280"
              y1="438"
              x2="350"
              y2="420"
              stroke="#FFD93D"
              stroke-width="5"
              stroke-linecap="round"/>
              
              
        <line x1="150"
              y1="420"
              x2="220"
              y2="438"
              stroke="#FFD93D"
              stroke-width="5"
              stroke-linecap="round"/>

        <!-- CENTERED BOOK ICON -->

    </g>

</svg>

</body>
</html>
