<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="puzzleHead5" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
    <radialGradient id="puzzleFace5" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#311B42"/>
      <stop offset="100%" stop-color="#1A0F23"/>
    </radialGradient>
    <linearGradient id="pieceOrange5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </linearGradient>
    <linearGradient id="pieceBlue5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="pieceGreen5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <filter id="puzzleGlow5" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#AB47BC" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Button Background -->
  <rect x="10" y="10" width="180" height="180" rx="30" ry="30" fill="#AB47BC" stroke="#212121" stroke-width="4"/>

  <!-- Antenna -->
  <line x1="100" y1="12" x2="100" y2="32" stroke="#E1BEE7" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="8" r="8" fill="#FFEB3B" filter="url(#puzzleGlow5)"/>
  <circle cx="100" cy="8" r="3" fill="#FFF"/>

  <!-- Head -->
  <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="url(#puzzleHead5)" filter="url(#puzzleGlow5)"/>
  <rect x="22" y="32" width="156" height="136" rx="42" ry="42" fill="none" stroke="#E1BEE7" stroke-width="3"/>

  <!-- Ears -->
  <ellipse cx="15" cy="100" rx="12" ry="22" fill="url(#puzzleHead5)" filter="url(#puzzleGlow5)"/>
  <ellipse cx="15" cy="100" rx="12" ry="22" fill="none" stroke="#E1BEE7" stroke-width="2"/>
  <ellipse cx="185" cy="100" rx="12" ry="22" fill="url(#puzzleHead5)" filter="url(#puzzleGlow5)"/>
  <ellipse cx="185" cy="100" rx="12" ry="22" fill="none" stroke="#E1BEE7" stroke-width="2"/>

  <!-- Face Screen -->
  <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="url(#puzzleFace5)"/>
  <rect x="38" y="52" width="124" height="96" rx="32" ry="32" fill="none" stroke="#CE93D8" stroke-width="2" opacity="0.5"/>

  <g transform="translate(0, 22)">
  <!-- === CONNECTED PUZZLE PIECES - CENTERED === -->
   <!-- RED piece (top-left) with small 'a' -->
  <path d="M 56 56
           L 78 56
           Q 78 48 84 48 Q 90 48 90 56
           L 90 56
           L 100 56
           L 100 78
           Q 108 78 108 84 Q 108 90 100 90
           L 100 90
           L 100 100
           L 78 100
           Q 78 108 72 108 Q 66 108 66 100
           L 66 100
           L 56 100
           L 56 78
           Q 48 78 48 72 Q 48 66 56 66
           L 56 66
           Z"
        fill="#F44336" opacity="0.95"/>
  <text x="78" y="84" font-family="'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#FFF" text-anchor="middle" opacity="0.95">a</text>

  <!-- BLUE piece (top-right) with capital 'A' -->
  <path d="M 100 56
           L 100 66
           Q 100 56 106 56 Q 112 56 112 66
           L 112 66
           L 112 56
           L 122 56
           Q 122 48 128 48 Q 134 48 134 56
           L 134 56
           L 144 56
           L 144 78
           Q 152 78 152 84 Q 152 90 144 90
           L 144 90
           L 144 100
           L 122 100
           Q 122 108 116 108 Q 110 108 110 100
           L 110 100
           L 100 100
           L 100 90
           Q 108 90 108 84 Q 108 78 100 78
           L 100 78
           Z"
        fill="#2196F3" opacity="0.95"/>
  <text x="122" y="84" font-family="'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="26" font-weight="bold" fill="#FFF" text-anchor="middle" opacity="0.95">A</text>

  <!-- Connection glow between pieces -->
  <line x1="86" y1="94" x2="94" y2="94" stroke="#FFEB3B" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="90" cy="94" r="5" fill="#FFEB3B" opacity="0.5"/>

  <!-- Sparkle decorations -->
  <polygon points="48,62 50,66 54,68 50,70 48,74 46,70 42,68 46,66" fill="#FFEB3B" opacity="0.8"/>
  <polygon points="152,58 154,62 158,64 154,66 152,70 150,66 146,64 150,62" fill="#FFEB3B" opacity="0.6"/>
  </g>

  <!-- Title Text -->
  <text x="100" y="178" font-size="16" font-family="'Fredoka One', 'Quicksand', sans-serif" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central" stroke="#00000066" stroke-width="2" paint-order="stroke">Letter Puzzle</text>
</svg>