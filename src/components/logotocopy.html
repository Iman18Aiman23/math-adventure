<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImanCore Learning Hub Mascot</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --navy: #2D4059;
            --navy-light: #4A6FA5;
            --sky: #A3D8F4;
            --sky-light: #EBF5FB;
            --gold: #FFD93D;
            --gold-dark: #F4C430;
            --coral: #FF6B6B;
            --green: #6BCB77;
            --peach: #FF9F1C;
            --orange: #FFB347;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #FFF8F0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1, .logo-text { font-family: 'Fredoka One', cursive; }

        /* ========= Container Maskot ========= */
        .mascot-container {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .mascot-container:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 15px 25px rgba(45, 64, 89, 0.15));
        }
        .mascot-container:active {
            transform: scale(0.98);
            transition-duration: 0.12s;
        }

        /* ========= Animasi SVG ========= */
        @keyframes floatMascot {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }
        @keyframes blinkEyes {
            0%, 90%, 100% { transform: scaleY(1); }
            95%           { transform: scaleY(0.05); }
        }
        @keyframes floatItem {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-8px) rotate(4deg); }
        }
        @keyframes floatItemReverse {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-8px) rotate(-4deg); }
        }
        @keyframes pulseStar {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.5); opacity: 0.5; }
        }
        @keyframes wiggleTassel {
            0%, 100% { transform: rotate(0deg); }
            25%      { transform: rotate(12deg); }
            75%      { transform: rotate(-12deg); }
        }
        @keyframes shineGlasses {
            0%       { transform: translateX(-50px) skewX(-20deg); }
            50%, 100%{ transform: translateX(30px) skewX(-20deg); }
        }
        @keyframes jello {
            0%   { transform: scale(1); }
            20%  { transform: scale(0.94, 1.06); }
            40%  { transform: scale(1.04, 0.96); }
            60%  { transform: scale(0.98, 1.02); }
            80%  { transform: scale(1.01, 0.99); }
            100% { transform: scale(1); }
        }

        .svg-mascot {
            width: 380px;
            height: auto;
            animation: floatMascot 3.5s ease-in-out infinite;
            filter: drop-shadow(0 8px 15px rgba(45, 64, 89, 0.1));
        }

        /* Animasi berterusan (idle) */
        .eyes { animation: blinkEyes 4s ease-in-out infinite; transform-origin: center; }
        .fl1 { animation: floatItem 3s ease-in-out infinite; }
        .fl2 { animation: floatItemReverse 3.2s ease-in-out infinite 0.5s; }
        .fl3 { animation: floatItem 3.5s ease-in-out infinite 1s; }
        .fl4 { animation: floatItemReverse 2.8s ease-in-out infinite 1.5s; }
        .ps  { animation: pulseStar 2.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .ps2 { animation: pulseStar 2.2s ease-in-out infinite 0.6s; transform-box: fill-box; transform-origin: center; }
        .ps3 { animation: pulseStar 2.2s ease-in-out infinite 1.2s; transform-box: fill-box; transform-origin: center; }
        .wg  { animation: wiggleTassel 2.5s ease-in-out infinite; transform-box: fill-box; transform-origin: 20% 20%; }
        
        /* Shine hanya semasa hover */
        .glass-shine { opacity: 0; transition: opacity 0.4s; }
        .mascot-container:hover .glass-shine { 
            opacity: 0.7; 
            animation: shineGlasses 1.8s ease-in-out infinite; 
        }

        .jello { animation: jello 0.6s ease !important; }

        .logo-text {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, var(--sky) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .subtitle-text {
            color: var(--gold-dark);
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            letter-spacing: 3px;
        }

        /* ========= Confetti ========= */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        @media (max-width: 480px) {
            .svg-mascot { width: 300px; }
            .logo-text { font-size: 2rem; }
            .subtitle-text { font-size: 0.9rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <script>
        /* ====== Kesan Jello & Confetti ====== */
        function popMascot(el, e) {
            el.classList.remove('jello');
            el.offsetHeight; // reflow
            el.classList.add('jello');
            setTimeout(() => el.classList.remove('jello'), 600);

            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            spawnConfetti(cx, cy);
        }

        function spawnConfetti(x, y) {
            const colors = ['#FFD93D','#4A6FA5','#A3D8F4','#6BCB77','#FF6B6B','#FF9F1C','#F4C430'];
            const count = 25;

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                const size = Math.random() * 8 + 4;
                const isCircle = Math.random() > 0.5;
                const color = colors[Math.floor(Math.random() * colors.length)];

                Object.assign(el.style, {
                    left: x + 'px',
                    top: y + 'px',
                    width: size + 'px',
                    height: size + 'px',
                    borderRadius: isCircle ? '50%' : '3px',
                    background: color
                });

                document.body.appendChild(el);

                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.8;
                const speed = Math.random() * 8 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 5;
                let px = 0, py = 0, opacity = 1, rot = 0;
                const gravity = 0.2;
                const rotSpeed = (Math.random() - 0.5) * 15;

                (function animate() {
                    vy += gravity;
                    px += vx;
                    py += vy;
                    opacity -= 0.015;
                    rot += rotSpeed;
                    vx *= 0.99;

                    el.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg)`;
                    el.style.opacity = Math.max(0, opacity);

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        el.remove();
                    }
                })();
            }
        }
    </script>
